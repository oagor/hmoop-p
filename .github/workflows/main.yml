name: Java CI with Maven

on:
  push:
    branches:
      - main
      - flexible
      - flexible-radio
      - lombok
  pull_request:
    branches:
      - main
      - flexible

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean verify
